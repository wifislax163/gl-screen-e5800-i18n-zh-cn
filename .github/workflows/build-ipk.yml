name: Build IPK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  IBM_PLEX_SC_TAG: "@ibm/plex-sans-sc@1.1.0"
  OPENWRT_IPKG_BUILD_COMMIT: "07a5e432c83aa5c5b8ef21caf84fc1d051dfcadc"

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.build.outputs.version }}
      artifact-name: gl-screen-e5800-i18n-zh-cn-${{ steps.build.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache IBM Plex Sans SC zip
        uses: actions/cache@v4
        with:
          path: assets/cache/ibm-plex-sans-sc/ibm-plex-sans-sc.zip
          key: ibm-plex-sans-sc-${{ env.IBM_PLEX_SC_TAG }}

      - name: Install deps
        run: |
          curl -fsSL "https://raw.githubusercontent.com/openwrt/openwrt/${OPENWRT_IPKG_BUILD_COMMIT}/scripts/ipkg-build" -o /tmp/ipkg-build
          chmod +x /tmp/ipkg-build
          sudo install -m 0755 /tmp/ipkg-build /usr/local/bin/ipkg-build
          pip install -r requirements.txt

      - name: Prepare overlay
        run: python scripts/prepare_overlay.py

      - name: Validate zh_cn keys
        run: python scripts/validate_zh_cn.py

      - name: Build ipk
        id: build
        run: |
          VERSION=$(date -u +%Y.%m.%d.%H%M%S)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python scripts/build_ipk.py --version "$VERSION"

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: gl-screen-e5800-i18n-zh-cn-${{ steps.build.outputs.version }}
          path: dist/*.ipk
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download ipk
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: dist

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          gh release create "v${VERSION}" dist/*.ipk \
            --title "gl-screen-e5800-i18n-zh-cn ${VERSION}" \
            --notes "Automated IPK build for GL-E5800 screen zh-CN language pack." \
            --latest
